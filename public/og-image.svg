<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1B3A3D"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Accent circles -->
  <circle cx="1100" cy="80"  r="200" fill="#E8631A" opacity="0.07"/>
  <circle cx="120"  cy="560" r="160" fill="#4A8B8C" opacity="0.09"/>

  <!-- Card -->
  <rect x="340" y="140" width="520" height="350" rx="28" fill="rgba(245,242,236,0.05)" stroke="rgba(245,242,236,0.1)" stroke-width="1.5"/>

  <!-- Datáfono icon -->
  <g transform="translate(540, 190)">
    <rect x="0" y="0" width="120" height="150" rx="14" fill="none" stroke="#F5F2EC" stroke-width="3"/>
    <rect x="12" y="14" width="96" height="52" rx="6" fill="#E8631A" opacity="0.9"/>
    <rect x="16" y="18" width="40" height="8" rx="3" fill="rgba(255,255,255,0.25)"/>
    <circle cx="30"  cy="92"  r="5" fill="rgba(245,242,236,0.5)"/>
    <circle cx="60"  cy="92"  r="5" fill="rgba(245,242,236,0.5)"/>
    <circle cx="90"  cy="92"  r="5" fill="rgba(245,242,236,0.5)"/>
    <circle cx="30"  cy="116" r="5" fill="rgba(245,242,236,0.5)"/>
    <circle cx="60"  cy="116" r="5" fill="rgba(245,242,236,0.5)"/>
    <circle cx="90"  cy="116" r="5" fill="rgba(245,242,236,0.5)"/>
    <rect x="40" y="148" width="40" height="28" rx="2" fill="rgba(245,242,236,0.3)"/>
    <line x1="46" y1="156" x2="74" y2="156" stroke="rgba(245,242,236,0.6)" stroke-width="2" stroke-linecap="round"/>
    <line x1="46" y1="164" x2="68" y2="164" stroke="rgba(245,242,236,0.6)" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- tipFund wordmark -->
  <text x="600" y="415" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="#F5F2EC" text-anchor="middle" letter-spacing="-1">tip<tspan fill="#E8631A">Fund</tspan></text>

  <!-- Slogan -->
  <text x="600" y="462" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#C8C2B0" text-anchor="middle" letter-spacing="0.3">cada uno lo suyo, sin líos</text>
</svg>
